# TPM 必须放在最前面
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# 推荐的插件
# 会话保存和恢复
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# 配置自动恢复
#set -g @continuum-restore 'on'

## 电池状态显示
#set -g @plugin 'tmux-plugins/tmux-battery'
## 然后在状态栏中配置显示
#set -g status-right '#{battery_status_bg} Batt: #{battery_icon} #{battery_percentage} #{battery_remain} | %a %h-%d %H:%M '

# CPU 负载显示
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g status-right '#{cpu_bg_color} CPU: #{cpu_icon} #{cpu_percentage} | #{ram_bg_color} RAM: #{ram_icon} #{ram_percentage} | %a %h-%d %H:%M '

# 状态栏设置
set -g status-interval 2
set -g status-right-length 100
#set -g status-right '\
#    #{cpu_bg_color} CPU: #{cpu_icon} #{cpu_percentage} \
#    #{ram_bg_color} RAM: #{ram_icon} #{ram_percentage} \
#    #{battery_status_bg} Batt: #{battery_icon} #{battery_percentage} \
#    | %a %h-%d %H:%M '

set -g status-right '\
    #{cpu_bg_color} CPU: #{cpu_icon} #{cpu_percentage} \
    #{ram_bg_color} RAM: #{ram_icon} #{ram_percentage} \
    | %a %h-%d %H:%M '


# 自定义颜色
set -g @cpu_low_bg_color "#[bg=green]"
set -g @cpu_medium_bg_color "#[bg=yellow]"
set -g @cpu_high_bg_color "#[bg=red]"

# 使用 Ctrl+方向键调整窗格大小
bind -n C-Up    resize-pane -U 1
bind -n C-Down  resize-pane -D 1
bind -n C-Left  resize-pane -L 1
bind -n C-Right resize-pane -R 1

# 启用鼠标支持
# set -g mouse on

# 使用 vi 模式
set -g mode-keys vi

# 绑定一些 vim 中的快捷键
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection
bind-key -T copy-mode-vi 'Y' send-keys -X copy-selection
bind-key -T copy-mode-vi 'w' send-keys -X next-word
bind-key -T copy-mode-vi 'b' send-keys -X previous-word
bind-key -T copy-mode-vi '0' send-keys -X start-of-line
bind-key -T copy-mode-vi '$' send-keys -X end-of-line

# 搜索相关绑定
bind-key -T copy-mode-vi '/' command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind-key -T copy-mode-vi '?' command-prompt -i -p "search up" "send -X search-backward-incremental \"%%%\""

bind-key -T copy-mode-vi 'n' send-keys -X search-again
bind-key -T copy-mode-vi 'N' send-keys -X search-reverse

# 退出复制模式
bind-key -T copy-mode-vi 'q' send-keys -X cancel

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# 在最后添加这行以初始化 TPM
run '~/.tmux/plugins/tpm/tpm'
